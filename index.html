<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Epstein Island | Wind & Scale</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #music-box { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 15px; border: 2px solid #ffcc00; z-index: 100; color: white; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #track-name { font-size: 11px; margin-bottom: 6px; color: #ffcc00; font-weight: bold; letter-spacing: 1px; }
        #joy-ui { position: absolute; bottom: 60px; left: 60px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; display: none; backdrop-filter: blur(5px); }
        #joy-knob { position: absolute; width: 45px; height: 45px; background: #fff; border-radius: 50%; top: 32.5px; left: 32.5px; box-shadow: 0 0 15px white; }
    </style>
</head>
<body>
    <div id="music-box">
        <div id="track-name">ISLAND AMBIENT</div>
        <iframe id="track" width="130" height="75" src="https://www.myinstants.com/instant/jeffrey-epstein-edit-98984/embed/" frameborder="0" scrolling="no"></iframe>
    </div>
    <div id="joy-ui"><div id="joy-knob"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { Sky } from 'three/addons/objects/Sky.js';
        import { Water } from 'three/addons/objects/Water.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 20000);
        camera.position.set(400, 60, 400); // Чуть дальше, так как всё стало больше
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- УЛУЧШЕННЫЙ СВЕТ ---
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sun = new THREE.DirectionalLight(0xffffff, 3.0);
        sun.position.set(300, 600, 150);
        sun.castShadow = true;
        sun.shadow.mapSize.set(2048, 2048);
        scene.add(sun);

        // НЕБО И ВОДА
        const sky = new Sky(); sky.scale.setScalar(10000); scene.add(sky);
        const sunVec = new THREE.Vector3();
        sunVec.setFromSphericalCoords(1, THREE.MathUtils.degToRad(82), THREE.MathUtils.degToRad(170));
        sky.material.uniforms['sunPosition'].value.copy(sunVec);

        const water = new Water(new THREE.PlaneGeometry(15000, 15000), {
            textureWidth: 512, textureHeight: 512,
            waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', t => t.wrapS = t.wrapT = THREE.RepeatWrapping),
            sunDirection: sunVec, sunColor: 0xffffff, waterColor: 0x004466, distortionScale: 5
        });
        water.rotation.x = -Math.PI/2; water.position.y = -5; scene.add(water);

        // УВЕЛИЧЕННЫЙ ОСТРОВ
        const island = new THREE.Mesh(new THREE.CylinderGeometry(650, 700, 35, 64), new THREE.MeshStandardMaterial({ color: 0x4a6a2a }));
        island.position.y = -15; island.receiveShadow = true; scene.add(island);

        // ВЕТЕР (Глобальный таймер)
        let time = 0;

        // УВЕЛИЧЕННЫЙ ХРАМ
        const temple = new THREE.Group();
        const tS = 150; // Было 100
        for(let i=0; i<10; i++) {
            const mat = new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0x0033aa : 0xffffff, roughness: 0.3 });
            const s = new THREE.Mesh(new THREE.BoxGeometry(tS, 12, tS), mat);
            s.position.y = i * 12 + 6; s.castShadow = true; temple.add(s);
        }
        const dome = new THREE.Mesh(new THREE.SphereGeometry(tS/2, 40, 40, 0, Math.PI*2, 0, Math.PI/2), 
            new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 1, roughness: 0.05 }));
        dome.position.y = 120; temple.add(dome);
        temple.position.y = 2;
        scene.add(temple);

        // ПАЛЬМЫ С ВЕТРОМ
        const palms = [];
        function addPalm(x, z) {
            const p = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(2, 4, 100), new THREE.MeshStandardMaterial({color: 0x443322}));
            trunk.position.y = 50; p.add(trunk);
            const leaves = new THREE.Group();
            for(let i=0; i<10; i++) {
                const l = new THREE.Mesh(new THREE.PlaneGeometry(50, 10), new THREE.MeshStandardMaterial({color: 0x113300, side: 2}));
                l.position.y = 100; l.rotation.y = i; l.rotation.z = 0.6; l.translateX(22); leaves.add(l);
            }
            p.add(leaves); p.position.set(x, 2, z); 
            scene.add(p); palms.push({obj: p, leaves: leaves, offset: Math.random() * 10});
        }
        for(let i=0; i<25; i++) addPalm(Math.cos(i)*450, Math.sin(i)*450);

        // ЛАБИРИНТ (Больше и четче)
        const mazeCanvas = document.createElement('canvas'); mazeCanvas.width = 512; mazeCanvas.height = 512;
        const ctx = mazeCanvas.getContext('2d');
        ctx.fillStyle = 'white'; ctx.fillRect(0,0,512,512); ctx.strokeStyle = '#c00'; ctx.lineWidth = 25;
        for(let i=0; i<7; i++) ctx.strokeRect(20+i*35, 20+i*35, 472-i*70, 472-i*70);
        const maze = new THREE.Mesh(new THREE.PlaneGeometry(350, 350), new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(mazeCanvas) }));
        maze.rotation.x = -Math.PI/2; maze.position.set(0, 3, 280); scene.add(maze);

        // МОБИЛЬНОЕ УПРАВЛЕНИЕ
        let move = { x: 0, y: 0, active: false, id: null, sX: 0, sY: 0 }, look = { active: false, id: null, lX: 0, lY: 0 }, rot = { yaw: 0, pitch: 0 };
        const joyUI = document.getElementById('joy-ui'), knob = document.getElementById('joy-knob');

        window.addEventListener('pointerdown', e => {
            if (e.clientX < window.innerWidth/2) {
                move.active = true; move.id = e.pointerId; move.sX = e.clientX; move.sY = e.clientY;
                joyUI.style.display = 'block'; joyUI.style.left = (e.clientX-55)+'px'; joyUI.style.top = (e.clientY-55)+'px';
            } else { look.active = true; look.id = e.pointerId; look.lX = e.clientX; look.lY = e.clientY; }
        });

        window.addEventListener('pointermove', e => {
            if (e.pointerId === move.id) {
                let dx = e.clientX - move.sX, dy = e.clientY - move.sY, d = Math.min(Math.sqrt(dx*dx+dy*dy), 45), a = Math.atan2(dy, dx);
                move.x = Math.cos(a)*(d/45); move.y = Math.sin(a)*(d/45);
                knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
            } else if (e.pointerId === look.id) {
                rot.yaw -= (e.clientX - look.lX)*0.007; rot.pitch = Math.max(-1.4, Math.min(1.4, rot.pitch - (e.clientY - look.lY)*0.007));
                look.lX = e.clientX; look.lY = e.clientY;
            }
        });

        window.addEventListener('pointerup', e => {
            if (e.pointerId === move.id) { move.active = false; move.x = 0; move.y = 0; joyUI.style.display = 'none'; }
            if (e.pointerId === look.id) look.active = false;
        });

        // КОЛЛИЗИЯ И МУЗЫКА
        const templeBounds = new THREE.Box3(new THREE.Vector3(-85, 0, -85), new THREE.Vector3(85, 150, 85));
        let isLockIn = false;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            // Эффект ветра для пальм
            palms.forEach(p => {
                p.obj.rotation.z = Math.sin(time + p.offset) * 0.02;
                p.leaves.rotation.y += 0.005;
            });

            if (move.active) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                const r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();
                let nextPos = camera.position.clone().addScaledVector(f, -move.y * 8).addScaledVector(r, move.x * 8);
                
                if (!templeBounds.containsPoint(nextPos) && nextPos.length() < 680) {
                    camera.position.copy(nextPos);
                }

                let dist = camera.position.length();
                if (dist < 180 && !isLockIn) {
                    isLockIn = true; document.getElementById('track-name').innerText = "LOCK IN MODE";
                    document.getElementById('track').src = "https://www.myinstants.com/instant/lock-in-epstein-edition-slowed-64683/embed/";
                } else if (dist > 220 && isLockIn) {
                    isLockIn = false; document.getElementById('track-name').innerText = "ISLAND AMBIENT";
                    document.getElementById('track').src = "https://www.myinstants.com/instant/jeffrey-epstein-edit-98984/embed/";
                }
            }
            camera.rotation.y = rot.yaw; camera.rotation.x = rot.pitch;
            water.material.uniforms['time'].value += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
